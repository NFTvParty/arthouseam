name: ArthouseAM Friday Night Blast

on:
  schedule:
    # Every Friday at 1:00 AM UTC = 9:00 PM EDT (UTC-4, Apr-Oct)
    # In winter EST (UTC-5), this fires at 8:00 PM — update to '0 2 * * 6' for Nov-Mar
    - cron: '0 1 * * 6'
  workflow_dispatch:  # allow manual trigger from GitHub Actions tab

jobs:
  send-blast:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ArthouseAM Friday SMS blast
        run: |
          curl -s -f -X POST \
            "https://arthouse-am-voicemail-1634.twil.io/friday-blast?token=${{ secrets.BLAST_TOKEN }}" \
            && echo "Blast triggered successfully" \
            || (echo "Blast failed" && exit 1)
