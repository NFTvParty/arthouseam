<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arthouse AM · 930</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --ink: #1a1410;
      --rust: #c94b2a;
      --gold: #b8922a;
      --warm-gray: #8a7f74;
      --paper: #ede8de;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.6;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
    }

    /* Decorative rule lines */
    .rule-top, .rule-bottom {
      position: fixed;
      left: 0; right: 0;
      height: 1px;
      background: var(--ink);
      opacity: 0.15;
    }
    .rule-top { top: 24px; }
    .rule-bottom { bottom: 24px; }

    .rule-left, .rule-right {
      position: fixed;
      top: 0; bottom: 0;
      width: 1px;
      background: var(--ink);
      opacity: 0.15;
    }
    .rule-left { left: 24px; }
    .rule-right { right: 24px; }

    /* Corner marks */
    .corner {
      position: fixed;
      width: 12px;
      height: 12px;
      opacity: 0.3;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--ink);
    }
    .corner--tl { top: 20px; left: 20px; }
    .corner--tr { top: 20px; right: 20px; }
    .corner--bl { bottom: 20px; left: 20px; }
    .corner--br { bottom: 20px; right: 20px; }

    .corner--tl::before, .corner--tr::before, .corner--bl::before, .corner--br::before {
      width: 100%; height: 1px; top: 0; left: 0;
    }
    .corner--tl::after, .corner--tr::after, .corner--bl::after, .corner--br::after {
      width: 1px; height: 100%; top: 0; left: 0;
    }
    .corner--tr::before { left: auto; right: 0; }
    .corner--tr::after { left: auto; right: 0; }
    .corner--bl::before { top: auto; bottom: 0; }
    .corner--bl::after { top: auto; bottom: 0; }
    .corner--br::before { top: auto; bottom: 0; left: auto; right: 0; }
    .corner--br::after { top: auto; bottom: 0; left: auto; right: 0; }

    /* Main content */
    .card {
      max-width: 560px;
      width: 100%;
      text-align: center;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--warm-gray);
      margin-bottom: 20px;
      animation: fadeUp 0.8s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .wordmark {
      font-family: 'Playfair Display', serif;
      font-size: clamp(52px, 10vw, 88px);
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 4px;
      animation: fadeUp 0.8s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .wordmark em {
      font-style: italic;
      color: var(--rust);
    }

    .frequency {
      font-family: 'DM Mono', monospace;
      font-size: clamp(13px, 2.5vw, 16px);
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--warm-gray);
      margin-bottom: 40px;
      animation: fadeUp 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
      animation: fadeUp 0.8s 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .divider-line { flex: 1; height: 1px; background: var(--ink); opacity: 0.12; }
    .divider-diamond {
      width: 6px; height: 6px;
      background: var(--rust);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* Player */
    .player-wrap {
      animation: fadeUp 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
      margin-bottom: 36px;
    }

    .player-label {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--warm-gray);
      margin-bottom: 16px;
    }

    .player {
      background: var(--paper);
      border: 1px solid rgba(26,20,16,0.12);
      border-radius: 4px;
      padding: 28px 32px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: relative;
      overflow: hidden;
    }

    .player::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--rust);
    }

    /* Waveform visualizer */
    .waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 32px;
      flex: 1;
    }

    .waveform-bar {
      width: 3px;
      border-radius: 2px;
      background: var(--ink);
      opacity: 0.15;
      transition: opacity 0.3s;
    }

    .waveform-bar.active {
      animation: wave var(--dur, 0.8s) ease-in-out infinite alternate;
      opacity: 0.7;
    }

    @keyframes wave {
      from { height: var(--min, 4px); }
      to { height: var(--max, 28px); }
    }

    .play-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1.5px solid var(--ink);
      background: var(--ink);
      color: var(--cream);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
      position: relative;
    }

    .play-btn:hover {
      background: var(--rust);
      border-color: var(--rust);
      transform: scale(1.05);
    }

    .play-btn:active { transform: scale(0.97); }

    .play-icon, .pause-icon { position: absolute; transition: opacity 0.15s; }
    .play-icon { opacity: 1; }
    .pause-icon { opacity: 0; }

    .player.playing .play-icon { opacity: 0; }
    .player.playing .pause-icon { opacity: 1; }

    .player-meta {
      text-align: left;
      flex: 1;
      min-width: 0;
    }

    .now-playing-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--warm-gray);
      margin-bottom: 4px;
    }

    .station-name {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--warm-gray);
      margin-right: 6px;
      vertical-align: middle;
      transition: background 0.3s;
    }

    .status-dot.live {
      background: var(--rust);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--warm-gray);
      margin-top: 4px;
      transition: color 0.3s;
    }

    .status-text.live { color: var(--rust); }

    /* Loading spinner */
    .loading-ring {
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      border-top-color: var(--rust);
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .play-btn.loading .loading-ring { display: block; }
    .play-btn.loading .play-icon, .play-btn.loading .pause-icon { opacity: 0; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Volume */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(26,20,16,0.08);
    }

    .vol-icon { color: var(--warm-gray); flex-shrink: 0; }

    input[type="range"] {
      -webkit-appearance: none;
      flex: 1;
      height: 2px;
      background: rgba(26,20,16,0.12);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--ink);
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      background: var(--rust);
      transform: scale(1.2);
    }

    /* Footer info */
    .info {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--warm-gray);
      line-height: 2;
      animation: fadeUp 0.8s 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .info a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid rgba(26,20,16,0.2);
      transition: border-color 0.2s, color 0.2s;
    }
    .info a:hover { color: var(--rust); border-color: var(--rust); }

    /* Error state */
    .error-msg {
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--rust);
      margin-top: 10px;
      display: none;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>

  <!-- Frame decorations -->
  <div class="rule-top"></div>
  <div class="rule-bottom"></div>
  <div class="rule-left"></div>
  <div class="rule-right"></div>
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <main class="page">
    <div class="card">

      <p class="eyebrow">New York · AM Radio</p>

      <h1 class="wordmark">Art<em>house</em><br>AM</h1>
      <p class="frequency">WPAT · 930 AM · New York</p>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-diamond"></div>
        <div class="divider-line"></div>
      </div>

      <div class="player-wrap">
        <p class="player-label">Live Stream</p>

        <div class="player" id="player">
          <button class="play-btn" id="playBtn" aria-label="Play / Pause">
            <div class="loading-ring"></div>
            <!-- Play icon -->
            <svg class="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <!-- Pause icon -->
            <svg class="pause-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </button>

          <div class="player-meta">
            <p class="now-playing-label">Now Playing</p>
            <p class="station-name">WPAT 930 AM</p>
            <p class="status-text" id="statusText">
              <span class="status-dot" id="statusDot"></span>
              <span id="statusLabel">Ready</span>
            </p>
          </div>

          <div class="waveform" id="waveform"></div>
        </div>

        <div class="volume-row">
          <svg class="vol-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
          </svg>
          <input type="range" id="volume" min="0" max="1" step="0.01" value="0.85" aria-label="Volume" />
          <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
          </svg>
        </div>

        <p class="error-msg" id="errorMsg">Stream unavailable — please try again shortly.</p>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-diamond"></div>
        <div class="divider-line"></div>
      </div>

      <p class="info">
        Multicultural Radio Broadcasting · New York, NY<br>
        <a href="https://www.wpat930am.com/" target="_blank" rel="noopener">wpat930am.com</a>
        &nbsp;·&nbsp;
        <a href="https://publicfiles.fcc.gov/am-profile/WPAT" target="_blank" rel="noopener">FCC Public File</a>
      </p>

    </div>
  </main>

  <script>
    const STREAM_URL = 'https://video1.getstreamhosting.com:2000/public/8288-4';

    const playBtn    = document.getElementById('playBtn');
    const playerEl   = document.getElementById('player');
    const volumeEl   = document.getElementById('volume');
    const statusDot  = document.getElementById('statusDot');
    const statusLabel= document.getElementById('statusLabel');
    const statusText = document.getElementById('statusText');
    const waveformEl = document.getElementById('waveform');
    const errorMsg   = document.getElementById('errorMsg');

    let audio = null;
    let playing = false;
    let bars = [];

    // Build waveform bars
    const barCount = 18;
    const minHeights = [], maxHeights = [];
    for (let i = 0; i < barCount; i++) {
      const bar = document.createElement('div');
      bar.className = 'waveform-bar';
      const min = 3 + Math.random() * 5;
      const max = 12 + Math.random() * 20;
      bar.style.setProperty('--min', min + 'px');
      bar.style.setProperty('--max', max + 'px');
      bar.style.setProperty('--dur', (0.55 + Math.random() * 0.7).toFixed(2) + 's');
      bar.style.height = min + 'px';
      bar.style.animationDelay = (Math.random() * 0.5).toFixed(2) + 's';
      waveformEl.appendChild(bar);
      bars.push(bar);
    }

    function setStatus(state) {
      statusDot.className = 'status-dot';
      statusText.className = 'status-text';
      if (state === 'loading') {
        statusLabel.textContent = 'Connecting…';
        playBtn.classList.add('loading');
      } else if (state === 'live') {
        statusLabel.textContent = 'Live';
        statusDot.classList.add('live');
        statusText.classList.add('live');
        playBtn.classList.remove('loading');
        bars.forEach(b => b.classList.add('active'));
      } else if (state === 'paused') {
        statusLabel.textContent = 'Paused';
        playBtn.classList.remove('loading');
        bars.forEach(b => b.classList.remove('active'));
      } else {
        statusLabel.textContent = 'Ready';
        playBtn.classList.remove('loading');
        bars.forEach(b => b.classList.remove('active'));
      }
    }

    function togglePlay() {
      errorMsg.classList.remove('visible');
      if (!audio) {
        audio = new Audio();
        audio.crossOrigin = 'anonymous';
        audio.volume = parseFloat(volumeEl.value);

        audio.addEventListener('playing', () => {
          playing = true;
          playerEl.classList.add('playing');
          setStatus('live');
        });

        audio.addEventListener('pause', () => {
          playing = false;
          playerEl.classList.remove('playing');
          setStatus('paused');
        });

        audio.addEventListener('waiting', () => setStatus('loading'));
        audio.addEventListener('stalled', () => setStatus('loading'));

        audio.addEventListener('error', () => {
          playing = false;
          playerEl.classList.remove('playing');
          setStatus('ready');
          errorMsg.classList.add('visible');
          audio = null;
        });
      }

      if (!playing) {
        setStatus('loading');
        // Add cache-buster to force fresh connection
        audio.src = STREAM_URL + '?t=' + Date.now();
        audio.play().catch(() => {
          setStatus('ready');
          errorMsg.classList.add('visible');
        });
      } else {
        audio.pause();
        audio.src = '';
      }
    }

    playBtn.addEventListener('click', togglePlay);

    volumeEl.addEventListener('input', () => {
      if (audio) audio.volume = parseFloat(volumeEl.value);
    });

    // Keyboard support
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && e.target === document.body) {
        e.preventDefault();
        togglePlay();
      }
    });
  </script>

</body>
</html>
