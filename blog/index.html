<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Mixtapes Â· ArthouseAM</title>
  <meta name="description" content="Every tracklist from ArthouseAM on WPAT 930 AM New York â a weekly vinyl-focused radio program, Fridays at 9PM.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #C44B25;
      --cream: #EDD9C0;
      --black: #000000;
      --off-white: #F4EAD8;
      --page-bg: #0D0D0D;
      --card-bg: #141414;
      --card-line: rgba(237, 217, 192, 0.10);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--page-bg);
      color: var(--cream);
      font-family: 'Space Mono', monospace;
      line-height: 1.6;
    }

    /* HEADER */
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid rgba(237, 217, 192, 0.12);
    }

    .site-header a {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--cream);
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s, color 0.2s;
    }

    .site-header a:hover {
      opacity: 1;
      color: var(--orange);
    }

    /* PAGE TITLE */
    .page-hero {
      max-width: 860px;
      margin: 0 auto;
      padding: 72px 40px 56px;
      border-bottom: 1px solid rgba(237, 217, 192, 0.12);
    }

    .page-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 900;
      font-style: italic;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--off-white);
      margin-bottom: 16px;
    }

    .page-hero p {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--cream);
      opacity: 0.4;
    }

    /* EPISODE LIST */
    .episode-list {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 40px 80px;
    }

    .episode-card {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 28px;
      padding: 28px 0;
      border-bottom: 1px solid rgba(237, 217, 192, 0.10);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .episode-card:first-child {
      border-top: 1px solid rgba(237, 217, 192, 0.10);
    }

    .episode-card:hover .ep-title {
      color: var(--orange);
    }

    .ep-date {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--orange);
      opacity: 0.7;
      white-space: nowrap;
      min-width: 120px;
    }

    .ep-body {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .ep-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--off-white);
      line-height: 1.2;
      transition: color 0.2s;
    }

    .ep-sub {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--cream);
      opacity: 0.4;
    }

    .ep-arrow {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      color: var(--cream);
      opacity: 0.2;
      transition: opacity 0.2s, color 0.2s;
    }

    .episode-card:hover .ep-arrow {
      opacity: 0.7;
      color: var(--orange);
    }

    /* FOOTER */
    .site-footer {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 40px;
      border-top: 1px solid rgba(237, 217, 192, 0.12);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .site-footer p,
    .site-footer a {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--cream);
      opacity: 0.3;
      text-decoration: none;
    }

    .site-footer a:hover {
      opacity: 0.7;
      color: var(--orange);
    }

    @media (max-width: 600px) {
      .site-header,
      .page-hero,
      .episode-list,
      .site-footer {
        padding-left: 20px;
        padding-right: 20px;
      }

      .episode-card {
        grid-template-columns: 1fr auto;
        gap: 16px;
      }

      .ep-date {
        grid-column: 1 / -1;
        padding-bottom: 0;
      }
    }
  </style>
</head>

  <footer class="site-footer">

    <a href="/">arthouseam.com</a>
  </footer>

</body>
</html>
